<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Get in touch with Whittleville for custom woodworking, restoration, and home services."
        />
        <title>Contact - Whittleville</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <!-- Header & Navigation -->
        <header class="header">
            <nav class="nav container">
                <a href="index.html" class="nav__logo">
                    <span class="nav__logo-icon">
                        <img src="images/logo-transparent.png" alt="logo" />
                    </span>
                    Whittleville
                </a>

                <button class="nav__toggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <div class="nav__menu">
                    <ul class="nav__list">
                        <li>
                            <a href="portfolio.html" class="nav__link"
                                >Portfolio</a
                            >
                        </li>
                        <li>
                            <a href="services.html" class="nav__link"
                                >Services</a
                            >
                        </li>
                        <li>
                            <a href="contact.html" class="nav__link">Contact</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>

        <!-- Page Header -->
        <section class="page-header">
            <h1 class="page-header__title">Get In Touch</h1>
            <p class="page-header__subtitle">Let's discuss your next project</p>
        </section>

        <!-- Contact Form -->
        <section class="section">
            <div class="contact-form">
                <form action="#" method="POST" id="contactForm">
                    <div class="form-group">
                        <label for="name" class="form-label">Name</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            class="form-input"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="phone" class="form-label">Phone</label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            class="form-input"
                        />
                    </div>

                    <!-- Honeypot field - hidden from humans, visible to bots -->
                    <div
                        class="form-group"
                        style="position: absolute; left: -9999px"
                        aria-hidden="true"
                    >
                        <label for="website">Website</label>
                        <input
                            type="text"
                            id="website"
                            name="website"
                            class="form-input"
                            tabindex="-1"
                            autocomplete="off"
                        />
                    </div>

                    <div class="form-group">
                        <label for="service" class="form-label"
                            >Service Interested In</label
                        >
                        <select id="service" name="service" class="form-input">
                            <option value="">Select a service...</option>
                            <option value="woodworking">Woodworking</option>
                            <option value="deck-building">Deck Building</option>
                            <option value="furniture-restoration">
                                Furniture Restoration
                            </option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message" class="form-label">
                            Project Details
                        </label>
                        <textarea
                            id="message"
                            name="message"
                            class="form-textarea"
                            required
                            placeholder="Tell us about your project..."
                        ></textarea>
                    </div>

                    <button type="submit" class="btn form-button">
                        Send Message
                    </button>
                </form>

                <div
                    style="
                        margin-top: 3rem;
                        text-align: center;
                        padding: 2rem;
                        background-color: var(--cream);
                        border-radius: 4px;
                    "
                >
                    <h3
                        style="
                            font-family: var(--font-heading);
                            color: var(--dark-olive);
                            margin-bottom: 1rem;
                        "
                    >
                        Other Ways to Reach Us
                    </h3>
                    <p style="margin-bottom: 0.5rem">
                        <strong>Email:</strong> hello@whittleville.com
                    </p>
                    <p style="margin-bottom: 0.5rem">
                        <strong>Phone:</strong> (555) 123-4567
                    </p>
                    <p><strong>Hours:</strong> Monday - Friday, 8am - 5pm</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <svg
                viewBox="0 0 1000 300"
                xmlns="http://www.w3.org/2000/svg"
                preserveAspectRatio="xMidYMid slice"
            >
                <!-- Olive green background -->
                <rect x="0" y="0" width="1000" height="300" fill="#4a4f2c" />

                <!-- Rust/terracotta rectangle - smaller, overlapping -->
                <rect x="0" y="150" width="400" height="150" fill="#a65039" />

                <!-- Mustard/tan gold triangle - large, from bottom left -->
                <polygon points="0,300 0,-100 280,300" fill="#e2ab58" />

                <!-- Sand/blush rectangle - top right -->
                <rect x="500" y="0" width="500" height="150" fill="#d4b797" />

                <!-- Sage green circle/ellipse - bottom right, partially cut off -->
                <ellipse cx="820" cy="300" rx="250" ry="270" fill="#a8b89f" />
            </svg>
            <div class="container">
                <p class="footer__text">
                    &copy; <script>document.write(new Date().getFullYear())</script> Whittleville. All rights reserved.
                </p>
            </div>
        </footer>

        <script src="js/main.js"></script>
    </body>
</html>
